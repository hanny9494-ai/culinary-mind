  pipeline/:
    purpose: "Phase 0-1 数据蒸馏 pipeline（Python）"
    status: active
    owner: coder
    children:
      prep/:     "OCR / 预处理（PaddleOCR、epub 转换）"
      l0/:       "L0 科学原理提取 + dedup + quality"
      l2a/:      "L2a 食材数据处理（R1/R2 蒸馏、merge、normalize）"
      l2b/:      "L2b 食谱处理（提取、标准化、assign_id）"
      skills/:   "Skill A/B/C/D 提取 + 信号路由 + 过滤"
      etl/:      "ETL 公共模块 + 外部数据适配器（Phase 1E）"
      utils/:    "pipeline 工具函数（API client、merge、quality）"
      _archive/: "已废弃的 pipeline 代码"

  engine/:
    purpose: "核心引擎 — 求解器 + 推理（Phase 1D/4B）"
    status: active
    owner: coder
    children:
      solver/:    "40 MF 数值求解器（40/40 已完成，PR #20/25/26/27/28/34/35/40，495 tests passing）— T01-10 (10), K01-07 (7), M01-11 (11), R01-07 (7), C01-05 (5) + 统一 provenance/llm_summary 返回格式（P1-22）+ @validate_bounds 装饰器（P1-21a）+ Hypothesis property tests（P1-21b, 46 tests 覆盖 15 高价值 MF）+ P3-Tier1 新增 T06/K06/T07/T10 (protein denaturation/hurdle tech/microwave dielectric/crystallization kinetics) + P3-Tier2-3 新增 M07/M08/T08/K07/T09/M09/M11/M10 (solubility/gas_permeability/ohmic_heating/binding_kinetics/respiration_rate/osmotic_dehydration/supercritical_extraction/membrane_transport) — 里程碑：P1-21c-D 12 new MF candidates backlog 全部实施完成"
      tools/:     "Task-oriented wrapper（estimate_heating_time 等，待建 P1-20）"
      agent/:     "**LangGraph Tool Registry（PR #40 完成，~280 LOC）**：39 MF tools 注册 (40 solvers，MF-T02 拆分为 k/cp/rho) + @tool 装饰器 + tool metadata + API (get_tool/list_tools/get_tools_by_domain) + 10 agent tests — **里程碑：Layer 3 接入层 foundation 完成，P4-08 LangGraph 主框架接入准备就绪**"
      retrieval/: "检索策略（Phase 4B，待建）"
    note: "D65 决策：不引入 SymPy/SciPy，所有 MF 手写解析解或数值解；依赖 CoolProp/fluids/ht/pint/scipy. P1-21a: solver_bounds.yaml sanity envelopes + @validate_bounds decorator 入参/输出范围校验"

