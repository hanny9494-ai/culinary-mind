# merge-policy.yaml — repo-curator 独占维护
# 版本: 1.0
# 更新: 2026-04-24
# 维护者: repo-curator agent

version: "1.0"
status: "active"

# ═══════════════════════════════════════════════════════
# 分支命名规范
# ═══════════════════════════════════════════════════════

branch_naming:
  pattern: "{type}/{task-id}-{slug}"
  types:
    - feat      # 新功能
    - fix       # bug 修复
    - refactor  # 重构
    - docs      # 文档
    - test      # 测试
    - chore     # 杂项（依赖升级、清理）
  examples:
    - "feat/p1-08-embedding-router"
    - "fix/compound-registry-strict-mode"
    - "docs/schema-v1.1-changelog"

# ═══════════════════════════════════════════════════════
# PR 判定规则（repo-curator 执行）
# ═══════════════════════════════════════════════════════

pr_judgment:

  auto_merge:
    description: "全部满足才可自动合并"
    conditions:
      - "纯文档修改（docs/、注释）或纯测试新增"
      - "code-reviewer 通过"
      - "GPT-5.4 无 CRITICAL"
      - "与 main 无冲突"
      - "不改敏感路径"
      - "无其他活跃 PR 改同一文件"

  merge_after_checks:
    description: "常规 PR 默认状态——双审通过后可合并"
    conditions:
      - "单模块改动"
      - "code-reviewer + GPT-5.4 双审通过"
      - "CI/测试通过"
      - "不改敏感路径，或审查时已专门覆盖"
      - "code-map 合规"
      - "无需 wiki-curator 联动更新，或已通知"

  hold:
    description: "任一满足即暂停合并"
    triggers:
      - "多个 PR 改同文件/同模块/同公共接口"
      - "改 schema/shared/config 核心文件"
      - "PR 间有依赖链（需按拓扑序 merge）"
      - "测试不稳定"
      - "大规模目录重组"

  waiting_for_jeff:
    description: "任一满足须等 Jeff 审批"
    triggers:
      - "删/重命名顶级目录"
      - "breaking change（schema major 升级）"
      - "不可逆数据迁移"
      - "跨 agent 架构方向冲突"
      - "需要放宽门禁的特殊情况"

# ═══════════════════════════════════════════════════════
# 合并排序算法（多 PR 时的 merge 顺序）
# ═══════════════════════════════════════════════════════

merge_ordering:
  priority_by_risk:  # 低风险先合
    1: docs
    2: config
    3: single_module_code
    4: shared_interface
    5: architecture_change

  topo_order:  # 底层先合
    - "docs/schemas/"
    - "pipeline/etl/"
    - "pipeline/"
    - "engine/"
    - "graph/"

  same_level_rule: "改动面小优先"
  high_risk_rule: "一次只合一个"

# ═══════════════════════════════════════════════════════
# 冲突预警规则
# ═══════════════════════════════════════════════════════

conflict_detection:
  scan_trigger: "每次收到新 PR 或现有 PR 更新时"
  checks:
    - "同文件被多个分支修改"
    - "同公共接口（common.py/run_skill.py）被修改"
    - "schema 文件被修改"
    - "config 核心文件被修改"
  output: "冲突源、涉及分支、风险等级、建议动作"

# ═══════════════════════════════════════════════════════
# 敏感路径（改动需额外审查，引用 code-map.yaml）
# ═══════════════════════════════════════════════════════

sensitive_paths_ref: "docs/code-map.yaml#sensitive_paths"

# ═══════════════════════════════════════════════════════
# 代码审查流程
# ═══════════════════════════════════════════════════════

review_flow:
  steps:
    1: "coder 提 PR"
    2: "code-reviewer 审代码质量"
    3: "GPT-5.4 审代码质量（cc-lead 调用 Lingya API）"
    4: "cc-lead 综合双审结果"
    5: "cc-lead dispatch repo-curator 做最终裁决"
    6: "repo-curator 判定：auto-merge / merge-after-checks / hold / waiting-for-Jeff"
    7: "merge 后通知 wiki-curator 更新状态"

  reviewer_focus:
    code_reviewer:
      - "错误处理（retry/异常/熔断）"
      - "资源安全（API 频率/并发/超时）"
      - "数据完整性（progress/resume/不丢失）"
      - "成本风险（API 费用/大批量保护）"
    gpt54:
      - "架构合理性"
      - "接口设计"
      - "边界条件"
      - "与现有代码的一致性"
    repo_curator:
      - "code-map 合规"
      - "分支/冲突安全"
      - "敏感路径审查"
      - "merge 顺序正确"

# ═══════════════════════════════════════════════════════
# 禁止操作
# ═══════════════════════════════════════════════════════

prohibited:
  - "force push 任何分支"
  - "直接 push main（必须走 PR）"
  - "合并未经双审的 PR"
  - "删除未 merge 的分支（除非 cc-lead 指示）"
  - "跳过 repo-curator 的最终裁决直接 merge"
