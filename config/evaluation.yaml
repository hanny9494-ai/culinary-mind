# Culinary Mind — RAGAS Evaluation Config
# Controls judge model, retrieval settings, and baseline configs

# Judge model for RAGAS scoring
# IMPORTANT: Must differ from the answer-generating model to avoid self-bias.
# Y-system answers are generated by Claude; judge must be Gemini or other non-Claude model.
judge_model: gemini-3.1-pro-preview-thinking

# Judge provider config
judge_provider: lingya  # lingya | openai | anthropic
judge_api_key_env: L0_API_KEY
judge_endpoint_env: L0_API_ENDPOINT

# Retrieval API
retrieval_api_url: http://localhost:8760
retrieval_top_k: 8

# RAGAS metrics to run
metrics:
  - context_precision
  - context_recall
  - faithfulness
  - answer_relevancy

# Golden set path (default)
golden_set: evaluation/golden_set/golden-set-v0.json

# Output directory
output_dir: evaluation/reports/
