# Culinary Mind v1 — Configuration

# Source project
project_root: ~/culinary-engine
ce_hub_dir: ~/culinary-engine/.ce-hub

# LLM API — Sonnet 4.6 via Lingya direct
api_endpoint: https://api.lingyaai.cn/v1/chat/completions
api_key_env: L0_API_KEY
model: claude-sonnet-4-6
no_proxy: true
max_tokens: 4096
temperature: 0.3

# Raw data sources
raw_sources:
  dispatches: raw/dispatches.jsonl
  results: raw/results.jsonl
  decisions: raw/decisions.jsonl
  conversations: raw/conversations.jsonl
  reports_dir: raw/reports/
  git_log: raw/git-log.jsonl

# Ingest paths (scanned for reports)
ingest_paths:
  - ~/culinary-engine/docs/research/
  - ~/culinary-engine/reports/

# Dreaming / decay parameters
decay:
  increment: 1.0          # +1.0 when mentioned in a curation cycle
  decrement: 0.1          # -0.1 per cycle if not mentioned
  stale_threshold: 1.0    # status → stale
  archive_threshold: 0.3  # status → archived, move to wiki/_archived/

# Schedule (used by ce-hub scheduler)
schedule:
  - "23:00"
  - "08:00"
